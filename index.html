<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Warehouse Order Pro v2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f4f9; padding: 12px; padding-bottom: 180px; }
    .header-box { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #ddd; }
    label { display: block; font-size: 10px; font-weight: bold; color: #888; margin-bottom: 4px; text-transform: uppercase; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fafafa; }

    .scanner-window { position: relative; width: 100%; height: 180px; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 3px solid #007aff; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ocr-target {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 220px; height: 50px;
      border: 2px solid #34c759;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
      border-radius: 4px; pointer-events: none;
    }
    .cam-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 15px; font-weight: bold; text-align: center;
      cursor: pointer; border-radius: 9px; z-index: 10;
    }
    .cam-overlay span { padding: 12px 20px; border: 2px solid #007aff; border-radius: 8px; background: #000; }

    .item-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
    .btn-del { background: #ff3b30; color: white; border: none; border-radius: 8px; width: 44px; height: 44px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

    .footer-actions { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 12px 15px 20px; border-top: 2px solid #ddd; z-index: 1000; box-sizing: border-box; }
    .btn { padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; box-sizing: border-box; }
    .btn-scan { background: #007aff; color: #fff; width: 100%; margin-bottom: 10px; box-shadow: 0 4px #0056b3; }
    .btn-scan:disabled { background: #b0c8f0; box-shadow: none; }
    .btn-finish { background: #34c759; color: white; width: 100%; height: 65px; border-bottom: 5px solid #248f40; }
    #status { font-size: 14px; text-align: center; color: #007aff; font-weight: 900; margin-bottom: 6px; min-height: 18px; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="header-box">
    <div style="margin-bottom: 8px;">
      <label>Customer Name</label>
      <input type="text" id="customer" placeholder="REQUIRED">
    </div>
    <div>
      <label>Job / PO Number</label>
      <input type="text" id="po" placeholder="REQUIRED">
    </div>
  </div>

  <div id="status">UNLOCKED</div>
  <div class="scanner-window">
    <video id="v" autoplay playsinline muted></video>
    <div class="ocr-target" id="ocr-box" style="display:none;"></div>
    <div class="cam-overlay" id="cam-overlay" onclick="startCamera()">
      <span>📷 TAP TO START CAMERA</span>
    </div>
  </div>

  <button class="btn btn-scan" id="scan-btn" onclick="captureText()" disabled>📸 READ 8-DIGIT CODE</button>

  <div id="items-list">
    <div class="item-row">
      <div style="width: 70px;"><label>Qty</label><input type="number" class="qty-field" value="1"></div>
      <div style="flex: 1;"><label>Item Code</label><input type="text" class="code-field" placeholder="0000-0000"></div>
      <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
    </div>
  </div>

  <button class="btn" style="background:#8e8e93; color:white; width:100%; margin-top:10px;" onclick="addNewRow()">+ MANUAL LINE</button>

  <div class="footer-actions">
    <button class="btn btn-finish" onclick="saveAndReset()">💾 SAVE PHOTO & RESET</button>
  </div>

  <canvas id="canvas-export" style="display:none;"></canvas>

<script>
  const video = document.getElementById('v');
  const statusEl = document.getElementById('status');
  const scanBtn = document.getElementById('scan-btn');
  const overlay = document.getElementById('cam-overlay');
  const ocrBox = document.getElementById('ocr-box');

  let cameraReady = false;
  let scanning = false;

  function startCamera() {
    overlay.innerHTML = '<span>⏳ Warming Up Engine...</span>';
    statusEl.textContent = 'CONNECTING BRIDGE...';

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } },
      audio: false
    })
    .then(stream => {
      video.srcObject = stream;
     
      const checkFrameLink = () => {
        if (video.readyState >= 2 && video.videoWidth > 0) {
          overlay.style.display = 'none';
          ocrBox.style.display = 'block';
          scanBtn.disabled = false;
          cameraReady = true;
          statusEl.textContent = 'READY TO SCAN';
          statusEl.style.color = '#34c759';
        } else {
          setTimeout(checkFrameLink, 200);
        }
      };

      video.play().then(checkFrameLink).catch(e => setTimeout(() => video.play().then(checkFrameLink), 500));
    })
    .catch(err => {
      overlay.innerHTML = '<span>⚠️ CAMERA DENIED<br>Check Safari Settings</span>';
      statusEl.textContent = 'PERMISSION ERROR';
    });
  }

  async function captureText() {
    if (!cameraReady || scanning) return;
    scanning = true;
    scanBtn.disabled = true;
    statusEl.textContent = 'READING...';

    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      // Center crop logic
      const cropW = Math.min(video.videoWidth * 0.7, 500);
      const cropH = Math.min(video.videoHeight * 0.35, 120);
      const cropX = (video.videoWidth - cropW) / 2;
      const cropY = (video.videoHeight - cropH) / 2;

      canvas.width = cropW * 1.5; // Upscale for Tesseract "eyes"
      canvas.height = cropH * 1.5;

      ctx.filter = 'grayscale(100%) contrast(200%) brightness(110%)';
      ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);

      const worker = await Tesseract.createWorker('eng');
      await worker.setParameters({
        tessedit_char_whitelist: '0123456789-', // IGNORE ALL LETTERS/NOISE
      });

      const { data: { text } } = await worker.recognize(canvas);
      await worker.terminate();

      let raw = text.replace(/[^0-9\-]/g, '').trim();
      let match = raw.match(/\d{4}-\d{4}/) || raw.match(/\d{8}/);

      if (match) {
        let code = match[0];
        if (/^\d{8}$/.test(code)) code = code.slice(0, 4) + '-' + code.slice(4);
        updateLastRow(code);
        statusEl.textContent = 'SUCCESS: ' + code;
        statusEl.style.color = '#34c759';
      } else {
        statusEl.textContent = 'RE-TRY: ALIGN BOX';
        statusEl.style.color = '#ff3b30';
      }
    } catch (err) {
      statusEl.textContent = 'SCAN ERROR';
    } finally {
      scanning = false;
      scanBtn.disabled = false;
    }
  }

  function updateLastRow(code) {
    const rows = document.querySelectorAll('.item-row');
    const lastRow = rows[rows.length - 1];
    const codeInput = lastRow.querySelector('.code-field');
    if (!codeInput.value) { codeInput.value = code; } else { addNewRow(code); }
  }

  function addNewRow(code = '') {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <div style="width: 70px;"><label>Qty</label><input type="number" class="qty-field" value="1"></div>
      <div style="flex: 1;"><label>Item Code</label><input type="text" class="code-field" value="${code}" placeholder="0000-0000"></div>
      <button class="btn-del" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('items-list').appendChild(div);
  }

  function saveAndReset() {
    const cust = document.getElementById('customer').value || 'NO-NAME';
    const po = document.getElementById('po').value || 'NO-PO';
    const rows = document.querySelectorAll('.item-row');
    const canvas = document.getElementById('canvas-export');
    const ctx = canvas.getContext('2d');

    canvas.width = 600;
    canvas.height = 400 + (rows.length * 60);

    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#007aff'; ctx.fillRect(0, 0, 600, 100);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 36px sans-serif';
    ctx.fillText('WAREHOUSE ORDER', 30, 65);
    ctx.fillStyle = '#000'; ctx.font = 'bold 24px sans-serif';
    ctx.fillText('CUSTOMER: ' + cust.toUpperCase(), 30, 150);
    ctx.fillText('JOB / PO: ' + po.toUpperCase(), 30, 190);
    ctx.font = '18px sans-serif'; ctx.fillStyle = '#666';
    ctx.fillText('DATE: ' + new Date().toLocaleString(), 30, 230);
    ctx.fillStyle = '#000'; ctx.font = 'bold 26px monospace';

    rows.forEach((row, i) => {
      const q = (row.querySelector('.qty-field').value || '1').padStart(2, '0');
      const c = row.querySelector('.code-field').value;
      if (c) ctx.fillText(`${q} PCS   -   ${c}`, 40, 300 + (i * 60));
    });

    const link = document.createElement('a');
    link.download = `ORDER-${cust}-${po}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    statusEl.textContent = 'ORDER SAVED!';
    setTimeout(() => location.reload(), 1500);
  }
</script>
</body>
</html>
