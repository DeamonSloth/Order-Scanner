<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Order Sheet Pro (iPhone Only)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

<!-- ZBar WASM barcode scanner -->
<script src="https://unpkg.com/@undecaf/zbar-wasm@0.9.14/dist/index.js"></script>

<style>
  body { margin:0; font-family:system-ui,sans-serif; background:#f4f4f9; padding:12px; padding-bottom:160px; }
  .header-box { background:#fff; padding:12px; border-radius:12px; margin-bottom:10px; border:1px solid #ddd; }
  label { display:block; font-size:10px; font-weight:bold; color:#888; margin-bottom:4px; text-transform:uppercase; }
  input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:16px; background:#fafafa; }

  .scanner-window { position:relative; width:100%; height:160px; background:#000; border-radius:12px; overflow:hidden; margin-bottom:10px; border:3px solid #007aff; }
  video { width:100%; height:100%; object-fit:cover; }

  .item-row { display:flex; gap:8px; align-items:flex-end; margin-bottom:10px; background:#fff; padding:12px; border-radius:10px; border:1px solid #eee; }
  .btn-del { background:#ff3b30; color:white; border:none; border-radius:8px; width:44px; height:44px; font-weight:bold; }

  .footer-actions { position:fixed; bottom:0; left:0; width:100%; background:#fff; padding:15px; border-top:2px solid #ddd; }
  .btn { padding:18px; border:none; border-radius:10px; font-weight:bold; font-size:18px; width:100%; }
  .btn-scan { background:#007aff; color:#fff; margin-bottom:10px; }
  .btn-finish { background:#34c759; color:white; height:65px; border-bottom:5px solid #248f40; }

  #status { font-size:14px; text-align:center; color:#007aff; font-weight:900; margin-bottom:6px; min-height:18px; text-transform:uppercase; }

  /* Android Blocker */
  #android-blocker {
    display:none;
    text-align:center;
    padding:40px;
    font-size:20px;
    font-weight:bold;
    color:#ff3b30;
  }
</style>
</head>

<body>

<div id="android-blocker">
  This app is for iPhone only.<br><br>
  Please use the Android app instead.
</div>

<div id="app-content" style="display:none;">

  <div class="header-box">
    <label>Customer Name</label>
    <input id="customer" placeholder="REQUIRED">

    <label>Job / PO</label>
    <input id="po" placeholder="REQUIRED">
  </div>

  <div id="status">Ready</div>

  <div class="scanner-window">
    <video id="v" autoplay playsinline muted></video>
  </div>

  <button class="btn btn-scan" onclick="startContinuousScan()">SCAN BARCODE</button>

  <div id="items-list">
    <div class="item-row">
      <div style="width:70px;"><label>Qty</label><input type="number" class="qty-field" value="1"></div>
      <div style="flex:1;"><label>Item Code</label><input class="code-field" placeholder="0000-0000"></div>
      <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
    </div>
  </div>

  <button class="btn" style="background:#8e8e93; color:white;" onclick="addNewRow()">+ MANUAL LINE</button>

  <div class="footer-actions">
    <button class="btn btn-finish" onclick="saveAndReset()">FINISH & SAVE</button>
  </div>

  <canvas id="canvas-export" style="display:none;"></canvas>

</div>

<script>
/* ---------------------------
   DEVICE CHECK (iPhone only)
----------------------------*/
const isIphone = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if (!isIphone) {
  document.getElementById("android-blocker").style.display = "block";
} else {
  document.getElementById("app-content").style.display = "block";
  startCamera();
}

let zbar = null;
let scanning = false;
const video = document.getElementById("v");
const status = document.getElementById("status");

/* ---------------------------
   CAMERA (iPhone optimized)
----------------------------*/
function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  })
  .then(stream => video.srcObject = stream)
  .catch(() => {
    status.textContent = "CAMERA ERROR";
    status.style.color = "#ff3b30";
  });
}

/* ---------------------------
   CONTINUOUS BARCODE SCAN
----------------------------*/
async function startContinuousScan() {
  if (scanning) return;

  scanning = true;
  status.textContent = "SCANNING...";
  status.style.color = "#007aff";

  if (!zbar) zbar = await ZBarWasm();

  // Wait for Safari to stabilize video
  await new Promise(r => setTimeout(r, 600));

  scanLoop();
}

async function scanLoop() {
  if (!scanning) return;

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth * 2;   // Higher resolution for ZBar
  canvas.height = video.videoHeight * 2;
  const ctx = canvas.getContext("2d");

  ctx.filter = "brightness(120%) contrast(140%)";
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const symbols = zbar.scanImageData(img);

  if (symbols.length > 0) {
    const code = symbols[0].decode();
    scanning = false;

    updateLastRow(code);
    status.textContent = "BARCODE: " + code;
    status.style.color = "#34c759";
    return;
  }

  // Try again in 200ms
  setTimeout(scanLoop, 200);
}

/* ---------------------------
   ROW MANAGEMENT
----------------------------*/
function updateLastRow(code) {
  const rows = document.querySelectorAll(".item-row");
  const last = rows[rows.length - 1];
  const field = last.querySelector(".code-field");

  if (field.value === "") field.value = code;
  else addNewRow(code);
}

function addNewRow(code = "") {
  const div = document.createElement("div");
  div.className = "item-row";
  div.innerHTML = `
    <div style="width:70px;"><label>Qty</label><input type="number" class="qty-field" value="1"></div>
    <div style="flex:1;"><label>Item Code</label><input class="code-field" value="${code}"></div>
    <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById("items-list").appendChild(div);
}

/* ---------------------------
   EXPORT PNG
----------------------------*/
function saveAndReset() {
  const cust = document.getElementById("customer").value || "NO-NAME";
  const po = document.getElementById("po").value || "NO-PO";
  const rows = document.querySelectorAll(".item-row");
  const canvas = document.getElementById("canvas-export");
  const ctx = canvas.getContext("2d");

  canvas.width = 600;
  canvas.height = 400 + (rows.length * 60);

  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#007aff";
  ctx.fillRect(0, 0, 600, 100);

  ctx.fillStyle = "#fff";
  ctx.font = "bold 36px sans-serif";
  ctx.fillText("ORDER", 30, 65);

  ctx.fillStyle = "#000";
  ctx.font = "bold 24px sans-serif";
  ctx.fillText("CUSTOMER: " + cust.toUpperCase(), 30, 150);
  ctx.fillText("JOB / PO: " + po.toUpperCase(), 30, 190);

  ctx.font = "18px sans-serif";
  ctx.fillStyle = "#666";
  ctx.fillText("DATE: " + new Date().toLocaleString(), 30, 230);

  ctx.fillStyle = "#000";
  ctx.font = "bold 26px monospace";

  rows.forEach((row, i) => {
    const q = (row.querySelector(".qty-field").value || "1").padStart(2, "0");
    const c = row.querySelector(".code-field").value;
    if (c) ctx.fillText(`${q}   -   ${c}`, 40, 300 + (i * 60));
  });

  const link = document.createElement("a");
  link.download = `ORDER-${cust}-${po}.png`;
  link.href = canvas.toDataURL("image/png", 0.92);
  link.click();

  status.textContent = "ORDER SAVED!";
  status.style.color = "#34c759";

  setTimeout(() => location.reload(), 1500);
}
</script>

</body>
</html>
