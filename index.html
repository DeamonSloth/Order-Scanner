<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Warehouse Order Pro v4.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f4f9; padding: 12px; padding-bottom: 190px; }
    .header-box { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #ddd; }
    label { display: block; font-size: 10px; font-weight: bold; color: #888; margin-bottom: 4px; text-transform: uppercase; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; background: #fafafa; }
    .scanner-window { position: relative; width: 100%; height: 170px; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 8px; border: 3px solid #007aff; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ocr-target { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 210px; height: 48px; border: 2px solid #34c759; box-shadow: 0 0 0 9999px rgba(0,0,0,0.55); border-radius: 4px; pointer-events: none; }
    .cam-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.88); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 15px; font-weight: bold; text-align: center; cursor: pointer; border-radius: 9px; }
    .tap-btn { padding: 10px 20px; border: 2px solid #007aff; border-radius: 8px; }
    .item-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
    .btn-del { background: #ff3b30; color: white; border: none; border-radius: 8px; width: 44px; height: 44px; font-size: 20px; cursor: pointer; flex-shrink: 0; }
    .footer-actions { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 12px 15px 22px; border-top: 2px solid #ddd; z-index: 1000; }
    .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 17px; margin-bottom: 8px; }
    .btn-scan { background: #007aff; color: #fff; }
    .btn-scan:disabled { background: #a0bce8; color: #ddd; }
    .btn-finish { background: #34c759; color: white; border-bottom: 5px solid #248f40; }
    #status { font-size: 13px; text-align: center; font-weight: 900; margin-bottom: 6px; min-height: 20px; text-transform: uppercase; color: #007aff; }
  </style>
</head>
<body>
  <div class="header-box">
    <label>Customer Name</label>
    <input type="text" id="customer" placeholder="REQUIRED">
    <label style="margin-top:10px;">Job / PO Number</label>
    <input type="text" id="po" placeholder="REQUIRED">
  </div>
  <div id="status">TAP CAMERA TO START</div>
  <div class="scanner-window">
    <video id="v" autoplay playsinline muted></video>
    <div class="ocr-target"></div>
    <div class="cam-overlay" id="cam-overlay" onclick="startCamera()">
      <div class="tap-btn">📷 START CAMERA</div>
    </div>
  </div>
  <button class="btn btn-scan" id="scan-btn" onclick="captureText()" disabled>📸 READ 8-DIGIT CODE</button>
  <div id="items-list">
    <div class="item-row">
      <div style="width:70px"><label>Qty</label><input type="number" class="qty-field" value="1" min="1"></div>
      <div style="flex:1"><label>Item Code</label><input type="text" class="code-field" placeholder="0000-0000"></div>
      <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
    </div>
  </div>
  <button class="btn" style="background:#8e8e93;color:white;" onclick="addNewRow()">+ MANUAL LINE</button>
  <div class="footer-actions">
    <button class="btn btn-finish" onclick="saveAndReset()">💾 SAVE PHOTO & RESET</button>
  </div>
  <canvas id="canvas-export" style="display:none;"></canvas>

<script>
const video = document.getElementById('v');
const statusEl = document.getElementById('status');
const scanBtn = document.getElementById('scan-btn');
const overlay = document.getElementById('cam-overlay');
let worker = null;
let cameraReady = false;

// Fix: jsDelivr CDN + Explicit Paths for Android
async function initTesseract() {
  try {
    worker = await Tesseract.createWorker('eng', 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/worker.min.js',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@4.0.4/tesseract-core-simd-lstm.wasm.js',
    });
    await worker.setParameters({ tessedit_char_whitelist: '0123456789-' });
    console.log("Brain Ready");
  } catch (e) { console.error("Init Error", e); }
}
initTesseract();

function startCamera() {
  overlay.innerHTML = '<span>⏳ Loading...</span>';
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      video.srcObject = stream;
      const check = () => {
        if (video.readyState >= 2 && video.videoWidth > 0) {
          overlay.style.display = 'none';
          cameraReady = true;
          scanBtn.disabled = false;
          statusEl.textContent = 'READY';
        } else { setTimeout(check, 200); }
      };
      video.play().then(check);
    })
    .catch(e => { statusEl.textContent = "CAMERA ERROR"; });
}

async function captureText() {
  if (!cameraReady || !worker) return;
  scanBtn.disabled = true;
  statusEl.textContent = "SCANNING...";
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  const cw = video.videoWidth * 0.7;
  const ch = video.videoHeight * 0.3;
  c.width = cw * 2; c.height = ch * 2;
  ctx.filter = 'grayscale(100%) contrast(200%) brightness(115%)';
  ctx.drawImage(video, (video.videoWidth-cw)/2, (video.videoHeight-ch)/2, cw, ch, 0, 0, c.width, c.height);
  const { data: { text } } = await worker.recognize(c);
  const clean = text.replace(/[^0-9\-]/g, '');
  const match = clean.match(/\d{4}-\d{4}/) || clean.match(/\d{8}/);
  if (match) {
    let res = match[0];
    if (/^\d{8}$/.test(res)) res = res.slice(0, 4) + '-' + res.slice(4);
    updateLastRow(res);
    statusEl.textContent = "✅ GOT: " + res;
  } else { statusEl.textContent = "❌ RETRY"; }
  scanBtn.disabled = false;
}

function updateLastRow(code) {
  const rows = document.querySelectorAll('.item-row');
  const last = rows[rows.length - 1];
  const input = last.querySelector('.code-field');
  if (!input.value) { input.value = code; } else { addNewRow(code); }
}

function addNewRow(code = '') {
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = `<div style="width:70px"><label>Qty</label><input type="number" class="qty-field" value="1" min="1"></div>
                   <div style="flex:1"><label>Item Code</label><input type="text" class="code-field" value="${code}"></div>
                   <button class="btn-del" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('items-list').appendChild(div);
}

function saveAndReset() {
  const cust = document.getElementById('customer').value || 'NO-NAME';
  const po = document.getElementById('po').value || 'NO-PO';
  const canvas = document.getElementById('canvas-export');
  const ctx = canvas.getContext('2d');
  const rows = document.querySelectorAll('.item-row');
  canvas.width = 600; canvas.height = 400 + (rows.length * 60);
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 600, canvas.height);
  ctx.fillStyle = '#007aff'; ctx.fillRect(0, 0, 600, 100);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px sans-serif';
  ctx.fillText('ORDER', 30, 65);
  ctx.fillStyle = '#000'; ctx.font = 'bold 24px sans-serif';
  ctx.fillText('CUST: ' + cust.toUpperCase(), 30, 150);
  ctx.fillText('PO: ' + po.toUpperCase(), 30, 190);
  ctx.font = 'bold 26px monospace';
  rows.forEach((r, i) => {
    const q = r.querySelector('.qty-field').value;
    const c = r.querySelector('.code-field').value;
    if (c) ctx.fillText(`${q} - ${c}`, 40, 300 + (i*60));
  });
  const link = document.createElement('a');
  link.download = `${cust}-${po}.png`;
  link.href = canvas.toDataURL();
  link.click();
  setTimeout(() => location.reload(), 1000);
}
</script>
</body>
</html>
