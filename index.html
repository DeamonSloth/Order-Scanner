<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Warehouse Order Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

  <!-- Polyfills for BarcodeDetector (WASM ZBar + polyfill) -->
  <script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.9.15/dist/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js"></script>

  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f4f9; padding: 12px; padding-bottom: 160px; }
    .header-box { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #ddd; }
    label { display: block; font-size: 10px; font-weight: bold; color: #888; margin-bottom: 4px; text-transform: uppercase; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fafafa; }
    
    .scanner-window { position: relative; width: 100%; height: 140px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 3px solid #007aff; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .ocr-target { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        width: 180px; height: 40px; 
        border: 2px solid #34c759; box-shadow: 0 0 0 9999px rgba(0,0,0,0.7); 
        border-radius: 4px; pointer-events: none; 
    }

    .item-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
    .btn-del { background: #ff3b30; color: white; border: none; border-radius: 8px; width: 44px; height: 44px; font-weight: bold; cursor: pointer; }
    
    .footer-actions { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px; border-top: 2px solid #ddd; z-index: 1000; }
    .btn { padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
    .btn-scan { background: #007aff; color: #fff; width: 100%; margin-bottom: 10px; }
    .btn-finish { background: #34c759; color: white; width: 100%; height: 65px; border-bottom: 5px solid #248f40; }
    #status { font-size: 14px; text-align: center; color: #007aff; font-weight: 900; margin-bottom: 6px; min-height: 18px; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="header-box">
    <div style="margin-bottom: 8px;">
      <label>Customer Name</label>
      <input type="text" id="customer" placeholder="REQUIRED">
    </div>
    <div>
      <label>Job / PO Number</label>
      <input type="text" id="po" placeholder="REQUIRED">
    </div>
  </div>

  <div id="status">Ready</div>
  <div class="scanner-window">
    <video id="v" autoplay playsinline></video>
    <div class="ocr-target"></div>
  </div>

  <button class="btn btn-scan" onclick="captureText()">📸 READ 8-DIGIT CODE</button>

  <div id="items-list">
    <div class="item-row">
      <div style="width: 70px;"><label>Qty</label><input type="number" class="qty-field" value="1"></div>
      <div style="flex: 1;"><label>Item Code</label><input type="text" class="code-field" placeholder="0000-0000"></div>
      <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
    </div>
  </div>

  <button class="btn" style="background:#8e8e93; color:white; width:100%; margin-top:10px;" onclick="addNewRow()">+ MANUAL LINE</button>

  <div class="footer-actions">
    <button class="btn btn-finish" onclick="saveAndReset()">💾 SAVE PHOTO & RESET</button>
  </div>

  <canvas id="canvas-export" style="display:none;"></canvas>

<script>
  const video = document.getElementById('v');
  const status = document.getElementById('status');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } })
    .then(stream => video.srcObject = stream);

  // ---------- REPLACED captureText() - barcode-first, longer scan, full-frame + ROI, OCR fallback ----------
  async function captureText() {
    status.textContent = "SEARCHING...";
    status.style.color = "#007aff";

    // detect iOS to prefer polyfill earlier (polyfill script tags should be present)
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    // Prepare a canvas for ROI and optionally full-frame capture
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    // Preferred barcode formats - expand to common 1D symbologies your tags might use
    const formats = ['code_128','code_39','code_93','ean_13','ean_8','itf','interleaved2of5','qr_code'];

    // Try to get a BarcodeDetector (native or polyfill)
    let detector = null;
    try {
      if (!isIOS && 'BarcodeDetector' in window) {
        detector = new BarcodeDetector({ formats });
      } else {
        // Force polyfill on iOS or if native missing; polyfill should expose BarcodeDetector
        if (!('BarcodeDetector' in window)) {
          await new Promise(r => setTimeout(r, 200));
        }
        detector = new BarcodeDetector({ formats });
      }
    } catch (e) {
      detector = null;
    }

    // If we have a detector, attempt detection for a longer window and check full frame + ROI
    if (detector) {
      let lastValue = null;
      let stableCount = 0;
      const maxAttempts = 80; // increase attempts so fallback doesn't happen too fast (~3-4s)
      let attempts = 0;

      while (attempts < maxAttempts) {
        attempts++;
        if (video.readyState >= 2) {
          const vw = video.videoWidth, vh = video.videoHeight;

          // 1) Try full frame detection first (so barcodes outside the green box are found)
          try {
            // Some detectors accept the video element directly; polyfill handles canvas too
            const fullResults = await detector.detect(video);
            if (fullResults && fullResults.length) {
              const raw = fullResults[0].rawValue.trim();
              const normalized = raw.replace(/[^0-9]/g, '');
              let formatted = normalized;
              if (normalized.length === 8) formatted = normalized.slice(0,4) + '-' + normalized.slice(4);

              if (formatted === lastValue) stableCount++; else { stableCount = 1; lastValue = formatted; }
              status.textContent = "SUCCESS: " + formatted;
              status.style.color = "#34c759";
              if (stableCount >= 2) { updateLastRow(formatted); return; }
              await new Promise(r => setTimeout(r, 50));
              continue;
            }
          } catch (err) {
            // ignore transient errors from detector.detect(video)
          }

          // 2) If full frame didn't find anything, crop to your existing ROI (same as OCR)
          try {
            const sx = Math.floor((vw / 2) - 200);
            const sy = Math.floor((vh / 2) - 50);
            const roiW = 400, roiH = 100;
            canvas.width = roiW; canvas.height = roiH;
            ctx.filter = "grayscale(100%) contrast(150%)";
            ctx.drawImage(video, sx, sy, roiW, roiH, 0, 0, roiW, roiH);

            const roiResults = await detector.detect(canvas);
            if (roiResults && roiResults.length) {
              const raw = roiResults[0].rawValue.trim();
              const normalized = raw.replace(/[^0-9]/g, '');
              let formatted = normalized;
              if (normalized.length === 8) formatted = normalized.slice(0,4) + '-' + normalized.slice(4);

              if (formatted === lastValue) stableCount++; else { stableCount = 1; lastValue = formatted; }
              status.textContent = "SUCCESS: " + formatted;
              status.style.color = "#34c759";
              if (stableCount >= 2) { updateLastRow(formatted); return; }
            } else {
              status.textContent = "SCANNING...";
              status.style.color = "#007aff";
              stableCount = 0;
              lastValue = null;
            }
          } catch (err) {
            // ignore transient errors and continue scanning
          }
        }
        // small pause to avoid tight loop
        await new Promise(r => setTimeout(r, 50));
      }
      // If we exit loop without barcode, fall through to OCR fallback
    }

    // --- OCR fallback (keeps your original logic exactly) ---
    try {
      canvas.width = 400; canvas.height = 100;
      ctx.filter = "grayscale(100%) contrast(150%)";
      ctx.drawImage(video, (video.videoWidth/2)-200, (video.videoHeight/2)-50, 400, 100, 0, 0, 400, 100);

      const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
      let raw = text.replace(/[^0-9-]/g, '').trim();
      let match = raw.match(/\d{4}-\d{4}/) || raw.match(/\d{8}/);
      if (match) {
        updateLastRow(match[0]);
        status.textContent = "SUCCESS: " + match[0];
        status.style.color = "#34c759";
      } else {
        status.textContent = "RE-TRY: ALIGN BOX";
        status.style.color = "#ff3b30";
      }
    } catch (err) {
      status.textContent = "ERROR: OCR FAILED";
      status.style.color = "#ff3b30";
    }
  }
  // ---------- end captureText replacement ----------

  function updateLastRow(code) {
    const rows = document.querySelectorAll('.item-row');
    const lastRow = rows[rows.length - 1];
    const codeInput = lastRow.querySelector('.code-field');
    if (codeInput.value === "") { codeInput.value = code; } else { addNewRow(code); }
  }

  function addNewRow(code = "") {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `<div style="width: 70px;"><label>Qty</label><input type="number" class="qty-field" value="1"></div><div style="flex: 1;"><label>Item Code</label><input type="text" class="code-field" value="${code}"></div><button class="btn-del" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('items-list').appendChild(div);
  }

  function saveAndReset() {
    const cust = document.getElementById('customer').value || "NO-NAME";
    const po = document.getElementById('po').value || "NO-PO";
    const rows = document.querySelectorAll('.item-row');
    const canvas = document.getElementById('canvas-export');
    const ctx = canvas.getContext('2d');
    canvas.width = 600; canvas.height = 400 + (rows.length * 60);
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#007aff"; ctx.fillRect(0, 0, 600, 100);
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 36px sans-serif"; ctx.fillText("WAREHOUSE ORDER", 30, 65);
    ctx.fillStyle = "#000"; ctx.font = "bold 24px sans-serif";
    ctx.fillText("CUSTOMER: " + cust.toUpperCase(), 30, 150);
    ctx.fillText("JOB / PO: " + po.toUpperCase(), 30, 190);
    ctx.font = "18px sans-serif"; ctx.fillStyle = "#666"; ctx.fillText("DATE: " + new Date().toLocaleString(), 30, 230);
    ctx.fillStyle = "#000"; ctx.font = "bold 26px monospace";
    rows.forEach((row, i) => {
      const q = row.querySelector('.qty-field').value;
      const c = row.querySelector('.code-field').value;
      if (c) ctx.fillText(`${q.padStart(2, '0')} PCS   -   ${c}`, 40, 300 + (i * 60));
    });
    const link = document.createElement('a');
    link.download = `${cust}-${po}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    alert("ORDER SAVED!");
    location.reload(); // Simplest reset
  }
</script>
</body>
</html>
